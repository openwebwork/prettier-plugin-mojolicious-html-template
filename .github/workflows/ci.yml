name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - run: npm ci
            - run: npm run format:check
            - run: npm run build
            - run: npm run lint:check
            - run: npm test
